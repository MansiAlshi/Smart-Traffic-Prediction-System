{% extends "base.html" %}
{% block title %}Forgot Password - Smart Traffic AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-4">
                <h3 class="text-center mb-1">Forgot Password</h3>
                <p class="text-center text-muted mb-4">Enter your email and we'll send reset instructions.</p>
                <div id="fpAlert" class="alert d-none"></div>
                <form id="fpForm">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" name="email" required placeholder="you@example.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
                <p class="text-center mt-3 mb-0"><a href="{{ url_for('pages.login') }}">← Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('fpForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('fpAlert');
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    alertEl.classList.add('d-none');
    try {
        const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: e.target.email.value })
        });
        const data = await res.json();
        alertEl.className = 'alert ' + (data.success ? 'alert-success' : 'alert-danger');
        alertEl.textContent = data.message;
        alertEl.classList.remove('d-none');
        if (data.success) e.target.reset();
    } catch {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = 'Cannot reach server. Run: python run.py';
        alertEl.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
    }
});
</script>
{% endblock %}
